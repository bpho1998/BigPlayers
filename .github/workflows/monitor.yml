name: Campaign Finance Monitor

on:
  schedule:
    # Runs every day at 9 AM Pacific (17:00 UTC) — after overnight data updates
    - cron: "0 17 * * *"
  workflow_dispatch:          # Allow manual runs from the Actions tab
    inputs:
      skip_calaccess:
        description: "Skip Cal-Access bulk download (faster test)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write             # Needed to commit seen_ids.json back to the repo

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run filing monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SKIP_CALACCESS: ${{ github.event.inputs.skip_calaccess || 'false' }}
        run: python src/check_filings.py

      - name: Commit updated seen IDs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_ids.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: update seen_ids.json [skip ci]"
          git push
